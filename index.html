<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovable Website</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #fef6f6;
      color: #333;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #e57373;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
    }
    button {
      background: #e57373;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #d32f2f;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Lovable Website 💖</h1>
  <div class="card">
    <p>This is a simple, warm, and lovable page made with care.</p>
    <button onclick="alert('You are lovable! 💕')">Click Me</button>
  </div>
</body>
</html>
